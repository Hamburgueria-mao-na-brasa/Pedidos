<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mao na Brasa | Admin</title>
    <meta name="theme-color" content="#ea580c">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        input,
        textarea,
        select {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 12px;
            color: white;
            outline: none;
            padding: 12px 14px;
            width: 100%;
        }

        option {
            color: #111;
        }

        .panel {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 18px;
        }

        .btn {
            border-radius: 12px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: .06em;
            padding: 12px 16px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
                <p class="text-orange-500 text-xs uppercase font-black tracking-[0.25em]">Painel</p>
                <h1 class="text-2xl md:text-3xl font-black uppercase italic">Mao na Brasa</h1>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="btn bg-white/10 hover:bg-white/15">Ver site</a>
                <button id="logout-btn" class="btn bg-red-600 hover:bg-red-500 hidden" onclick="logout()">Sair</button>
            </div>
        </header>

        <section id="login-card" class="panel p-5 max-w-md">
            <h2 class="font-black uppercase mb-4">Entrar como admin</h2>
            <div class="space-y-3">
                <input id="email" type="email" placeholder="Email do admin" value="williancarlos0103@gmail.com">
                <input id="password" type="password" placeholder="Senha">
                <button class="btn bg-orange-600 hover:bg-orange-500 w-full" onclick="login()">Entrar</button>
                <p class="text-xs text-zinc-500">Acesso restrito a administradores cadastrados.</p>
                <p id="login-message" class="text-sm text-zinc-400"></p>
            </div>
        </section>

        <section id="admin-card" class="hidden grid lg:grid-cols-[380px_1fr] gap-5">
            <form id="product-form" class="panel p-5 space-y-3" onsubmit="saveProduct(event)">
                <div class="flex items-center justify-between gap-3">
                    <h2 class="font-black uppercase">Produto</h2>
                    <button type="button" class="btn bg-white/10 hover:bg-white/15" onclick="newProduct()">Novo</button>
                </div>
                <input id="product-id" type="hidden">
                <label class="block text-xs font-bold uppercase text-zinc-400">Nome</label>
                <input id="product-name" required>
                <label class="block text-xs font-bold uppercase text-zinc-400">Categoria</label>
                <input id="product-category" list="category-options" placeholder="Ex: Combos, Burgers, Bebidas">
                <datalist id="category-options">
                    <option value="Combos"></option>
                    <option value="Burgers"></option>
                    <option value="Porcoes"></option>
                    <option value="Sobremesas"></option>
                    <option value="Bebidas"></option>
                </datalist>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold uppercase text-zinc-400">Preco</label>
                        <input id="product-price" type="number" step="0.01" min="0" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-zinc-400">Ordem</label>
                        <input id="product-order" type="number" step="1" min="0">
                    </div>
                </div>
                <label class="block text-xs font-bold uppercase text-zinc-400">Imagem</label>
                <input id="product-image" placeholder="ex: brasa.jpg ou URL">
                <div class="grid grid-cols-[1fr_auto] gap-2 items-center">
                    <input id="product-photo" type="file" accept="image/*">
                    <button type="button" class="btn bg-white/10 hover:bg-white/15" onclick="uploadProductPhoto()">Enviar</button>
                </div>
                <p class="text-xs text-zinc-500">No celular, toque em escolher arquivo para pegar uma foto da galeria ou camera.</p>
                <label class="block text-xs font-bold uppercase text-zinc-400">Descricao</label>
                <textarea id="product-description" rows="4"></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex items-center gap-2 text-sm">
                        <input id="product-addons" type="checkbox" class="w-auto">
                        Extras
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input id="product-available" type="checkbox" class="w-auto" checked>
                        Disponivel
                    </label>
                </div>
                <label class="block text-xs font-bold uppercase text-zinc-400">Selo</label>
                <select id="product-tag">
                    <option value="">Sem selo</option>
                    <option value="vendido">Famoso</option>
                    <option value="chef">Chef</option>
                </select>
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button type="submit" class="btn bg-orange-600 hover:bg-orange-500">Salvar</button>
                    <button type="button" class="btn bg-red-600 hover:bg-red-500" onclick="deleteProduct()">Excluir</button>
                </div>
                <p id="form-message" class="text-sm text-zinc-400"></p>
            </form>

            <div class="panel p-5">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-4">
                    <h2 class="font-black uppercase">Cardapio</h2>
                    <input id="search" placeholder="Buscar produto" oninput="renderProducts()">
                </div>
                <div id="products-list" class="grid gap-3"></div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://hpjvlayhinbtpgmlocaw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FV32W6qp4Jfi05CQp2CUCQ_Hz_GIqQQ";
        const PRODUCT_IMAGES_BUCKET = "mnb-images";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let products = [];

        const INITIAL_CATALOG = [
            ["Barca",79.90,"2 hambúrgueres + batata com bacon e cheddar","barca1 (1).jpg",true,"vendido","Combos"],
            ["Combo Individual",49.90,"Classic Salada + batata frita + bacon + queijo prato","combo.jpg",true,"chef","Combos"],
            ["Brasa Duplo",91.90,"2 hambúrgueres + batata com bacon e cheddar + 2 Coca-Cola 350 ml","barca.jpg",true,"vendido","Combos"],
            ["Na Brasa",45.90,"Blend bovino de 160 g, bacon, queijo muçarela, abacaxi selado no mel, queijo coalho, alface, tomate e cebola roxa.","brasa.jpg",true,"chef","Hambúrgueres"],
            ["Salada Duplo",42.90,"Dois blends, dobro de queijo, três porções de bacon e ovo.","prime.jpg",true,"chef","Hambúrgueres"],
            ["Cheese Burger Duplo",38.90,"Dois blends, dose tripla de cheddar e bacon.","Cheese Burger Duplo.jpg",true,"vendido","Hambúrgueres"],
            ["Frango Crispy",39.90,"Frango empanado, queijo muçarela empanado, bacon e Catupiry.","crispy.jpg",true,"vendido","Hambúrgueres"],
            ["Costela Prime",44.90,"Blend, costela desfiada e cream cheese maçaricado.","costela.jpg",true,"","Hambúrgueres"],
            ["Piscina de Cheddar",37.99,"Burger com bacon mergulhado em uma piscina de cheddar.","piscina.jpg",true,"vendido","Hambúrgueres"],
            ["Bacon Burguer Duplo",42.90,"Dois blends, duas camadas de bacon e molho.","duplo (1).jpg",true,"","Hambúrgueres"],
            ["Bacon Burguer",33.90,"Blend, bacon crocante e queijo prato.","bacon.jpg",true,"","Hambúrgueres"],
            ["Bacon Burguer Triplo",49.90,"Três blends, três porções de bacon e cebola caramelizada.","triplobacon.jpg",true,"","Hambúrgueres"],
            ["Cheese Burger",29.90,"Blend suculento, cheddar duplo e bacon.","chesse (1).jpg",true,"","Hambúrgueres"],
            ["Classic Burguer Salada",29.90,"Blend, queijo prato, salada e maionese.","salada.jpg",true,"","Hambúrgueres"],
            ["Classic Burguer Bacon Caramelizado",34.90,"Blend de 160 g, bacon, queijo e salada.","bacon caramelizado.jpg",true,"","Hambúrgueres"],
            ["Classic Burguer Salada Especial",34.90,"Blend de 160 g, bacon, queijo e salada.","saladaespecial.jpg",true,"","Hambúrgueres"],
            ["Classic Burguer X-Tudo",34.99,"Blend de 160 g, bacon, queijo, ovo, salsicha, alface, tomate, cebola e abacaxi.","xtudo.jpg",true,"","Hambúrgueres"],
            ["Batata Frita Especial 250 g",19.90,"Cheddar ou queijo e bacon.","batata250.jpg",false,"","Porções"],
            ["Batata Frita Especial 500 g",34.90,"Cheddar ou queijo e bacon.","batata500.jpg",false,"vendido","Porções"],
            ["Anéis de Cebola",19.90,"Crocantes.","onion (1).jpg",false,"","Porções"],
            ["Batata Especial de Strogonoff",27.90,"Batata, strogonoff e Catupiry.","bstrogonoff.jpg",false,"","Porções"],
            ["Batata Especial de Costela",27.90,"Batata, costela e Catupiry.","bcostela.jpg",false,"chef","Porções"],
            ["Batata Especial de Calabresa",27.90,"Batata, calabresa, bacon e muçarela.","bmussarela.jpg",false,"","Porções"],
            ["Batata Especial de Carne",27.90,"Batata, strogonoff de carne e Catupiry.","bcarne.jpg",false,"","Porções"],
            ["Brigadeiro Sortido",16.00,"Caixa com 4 unidades.","brigadeiro.jpg",false,"","Sobremesas"],
            ["Brownie com Sorvete",22.00,"Sorvete e ganache.","Brawnie com Sorvete.jpg",false,"chef","Sobremesas"],
            ["Pizza de Brownie",27.00,"Leite Ninho e Nutella.","Browniepizza.jpg",false,"vendido","Sobremesas"],
            ["Pudim Cremoso",12.00,"Leite condensado.","pudim (1).jpg",false,"","Sobremesas"],
            ["Coca-Cola 1,5 L",13.00,"Garrafa gelada.","coca2l.jpg",false,"","Bebidas"],
            ["Guaraná Mineiro 1,5 L",13.00,"Garrafa gelada.","Guarana.jpg",false,"","Bebidas"],
            ["Coca-Cola Lata",6.00,"350 ml, gelada.","coca350.jpg",false,"","Bebidas"],
            ["Coca-Cola Zero Lata",6.00,"350 ml, gelada.","cocazero350.jpg",false,"","Bebidas"],
            ["Guaraná Mineiro Lata",6.00,"350 ml, gelada.","guaranaM350.jpg",false,"","Bebidas"],
            ["Suco de Laranja",12.00,"400 ml, natural.","sucodelaranja.jpg",false,"","Bebidas"],
            ["Suco de Acerola",12.00,"400 ml, natural.","acelora.jpg",false,"","Bebidas"],
            ["Suco Detox",12.00,"Couve, gengibre, abacaxi, cenoura e hortelã. 400 ml, natural.","detox.jpg",false,"","Bebidas"],
            ["Suco de Abacaxi com Hortelã",10.00,"400 ml, natural.","abacaxi.jpg",false,"","Bebidas"],
            ["Água com Gás",5.00,"500 ml.","aguag.jpg",false,"","Bebidas"],
            ["Água sem Gás",4.00,"500 ml.","agua.jpg",false,"","Bebidas"]
        ];

        function slugify(value) {
            return String(value || 'produto')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '') || `produto-${Date.now()}`;
        }

        async function init() {
            const { data } = await supabaseClient.auth.getSession();
            if (data.session) await showAdmin();
        }

        async function login() {
            setLoginMessage('Entrando...');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) return setLoginMessage(error.message);
            await showAdmin();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        function setLoginMessage(message) {
            document.getElementById('login-message').innerText = message;
        }

        async function showAdmin() {
            const { data, error } = await supabaseClient.from('mnb_admin_profiles').select('email').limit(1);
            if (error || !data.length) {
                await supabaseClient.auth.signOut();
                return setLoginMessage('Este email nao esta liberado como admin.');
            }
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('admin-card').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            await importMissingCatalogProducts();
            await loadProducts();
        }

        async function importMissingCatalogProducts() {
            setLoginMessage('Sincronizando cardápio...');
            const { data: existing, error: readError } = await supabaseClient
                .from('mnb_products').select('name');
            if (readError) return setLoginMessage(`Não foi possível conferir o cardápio: ${readError.message}`);

            const existingNames = new Set((existing || []).map(item => item.name.toLocaleLowerCase('pt-BR')));
            const missing = INITIAL_CATALOG
                .filter(item => !existingNames.has(item[0].toLocaleLowerCase('pt-BR')))
                .map((item, index) => ({
                    id: slugify(item[0]),
                    name: item[0], price: item[1], description: item[2], image: item[3],
                    has_addons: item[4], tag: item[5], category: item[6],
                    available: true, sort_order: (existing?.length || 0) + index + 1
                }));

            if (!missing.length) return setLoginMessage('Cardápio atualizado.');
            const { error } = await supabaseClient.from('mnb_products').insert(missing);
            setLoginMessage(error ? `Erro ao importar cardápio: ${error.message}` : `${missing.length} produtos adicionados ao painel.`);
        }

        async function loadProducts() {
            const { data, error } = await supabaseClient
                .from('mnb_products')
                .select('*')
                .order('sort_order', { ascending: true });
            if (error) {
                document.getElementById('products-list').innerHTML = `<p class="text-red-400">${error.message}</p>`;
                return;
            }
            products = data;
            updateCategoryOptions();
            renderProducts();
        }

        function updateCategoryOptions() {
            const categories = [...new Set(products.map(product => product.category).filter(Boolean))].sort();
            const defaults = ['Combos', 'Burgers', 'Porcoes', 'Sobremesas', 'Bebidas'];
            const options = [...new Set([...defaults, ...categories])];
            document.getElementById('category-options').innerHTML = options
                .map(category => `<option value="${category}"></option>`)
                .join('');
        }

        function renderProducts() {
            const term = document.getElementById('search').value.toLowerCase();
            const visible = products.filter(product => product.name.toLowerCase().includes(term));
            document.getElementById('products-list').innerHTML = visible.map(product => `
                <button class="text-left bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl p-3 flex items-center gap-3" onclick="editProduct('${product.id}')">
                    <div class="w-16 h-16 rounded-xl bg-zinc-900 bg-cover bg-center shrink-0" style="background-image:url('${product.image}')"></div>
                    <div class="min-w-0 flex-1">
                        <div class="font-black uppercase text-sm truncate">${product.name}</div>
                        <div class="text-xs text-zinc-400">${product.category} - R$ ${Number(product.price).toFixed(2)}</div>
                    </div>
                    <span class="text-[10px] font-black uppercase ${product.available ? 'text-green-400' : 'text-red-400'}">${product.available ? 'Ativo' : 'Oculto'}</span>
                </button>
            `).join('');
        }

        function editProduct(id) {
            const product = products.find(item => item.id === id);
            if (!product) return;
            document.getElementById('product-id').value = product.id;
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-category').value = product.category;
            document.getElementById('product-price').value = product.price;
            document.getElementById('product-order').value = product.sort_order || 0;
            document.getElementById('product-image').value = product.image || '';
            document.getElementById('product-description').value = product.description || '';
            document.getElementById('product-addons').checked = product.has_addons;
            document.getElementById('product-available').checked = product.available;
            document.getElementById('product-tag').value = product.tag || '';
            setFormMessage('');
        }

        function newProduct() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('product-available').checked = true;
            setFormMessage('');
        }

        async function saveProduct(event) {
            event.preventDefault();
            const name = document.getElementById('product-name').value.trim();
            const id = document.getElementById('product-id').value || slugify(name);
            const product = {
                id,
                name,
                category: document.getElementById('product-category').value.trim() || 'Outros',
                price: Number(document.getElementById('product-price').value || 0),
                sort_order: Number(document.getElementById('product-order').value || 0),
                image: document.getElementById('product-image').value.trim(),
                description: document.getElementById('product-description').value.trim(),
                has_addons: document.getElementById('product-addons').checked,
                available: document.getElementById('product-available').checked,
                tag: document.getElementById('product-tag').value,
                updated_at: new Date().toISOString()
            };
            const { error } = await supabaseClient.from('mnb_products').upsert(product);
            if (error) return setFormMessage(error.message);
            setFormMessage('Produto salvo.');
            await loadProducts();
            editProduct(id);
        }

        async function uploadProductPhoto() {
            const fileInput = document.getElementById('product-photo');
            const file = fileInput.files && fileInput.files[0];
            if (!file) return setFormMessage('Escolha uma foto primeiro.');
            if (!file.type.startsWith('image/')) return setFormMessage('Escolha um arquivo de imagem.');

            setFormMessage('Enviando foto...');
            const productName = document.getElementById('product-name').value.trim() || 'produto';
            const ext = file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
            const filePath = `products/${slugify(productName)}-${Date.now()}.${ext}`;
            const { error } = await supabaseClient.storage
                .from(PRODUCT_IMAGES_BUCKET)
                .upload(filePath, file, {
                    cacheControl: '3600',
                    upsert: false
                });

            if (error) return setFormMessage(error.message);

            const { data } = supabaseClient.storage
                .from(PRODUCT_IMAGES_BUCKET)
                .getPublicUrl(filePath);

            document.getElementById('product-image').value = data.publicUrl;
            setFormMessage('Foto enviada. Salve o produto para aplicar.');
        }

        async function deleteProduct() {
            const id = document.getElementById('product-id').value;
            if (!id) return setFormMessage('Escolha um produto primeiro.');
            if (!confirm('Excluir este produto?')) return;
            const { error } = await supabaseClient.from('mnb_products').delete().eq('id', id);
            if (error) return setFormMessage(error.message);
            setFormMessage('Produto excluido.');
            newProduct();
            await loadProducts();
        }

        function setFormMessage(message) {
            document.getElementById('form-message').innerText = message;
        }

        init();
    </script>
</body>

</html>
